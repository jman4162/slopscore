site_name: slopscore
site_description: A transparent linter for AI-slop writing patterns (not an AI detector)
site_url: https://jman4162.github.io/slopscore/
repo_url: https://github.com/jman4162/slopscore
copyright: >-
  &copy; 2026 Mount Si Labs LLC. All rights reserved. &middot;
  <a href="https://en.wikipedia.org/wiki/Wikipedia:Signs_of_AI_writing">Signs of AI writing</a>
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle: { icon: material/weather-night, name: Dark mode }
    - scheme: slate
      primary: indigo
      accent: amber
      toggle: { icon: material/weather-sunny, name: Light mode }
  features:
    - navigation.top
    - content.code.copy
    - search.suggest

nav:
  - Home: index.md
  - Configuration: configuration.md
  - Suppression: suppression.md
  - Baseline: baseline.md
  - Prose-in-code & fairness: code-and-fairness.md
  - Benchmark & results: benchmark.md
  - Limitations & authorship: limitations.md
  - Model card: https://github.com/jman4162/slopscore/blob/main/MODEL_CARD.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - toc: { permalink: true }

plugins:
  - search
