site_name: slopscore
site_description: A transparent linter for AI-slop writing patterns (not an AI detector)
repo_url: https://github.com/jman4162/slopscore
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle: { icon: material/weather-night, name: Dark mode }
    - scheme: slate
      primary: indigo
      accent: amber
      toggle: { icon: material/weather-sunny, name: Light mode }
  features:
    - navigation.top
    - content.code.copy
    - search.suggest

nav:
  - Home: index.md
  - Configuration: configuration.md
  - Suppression: suppression.md
  - Baseline: baseline.md
  - Limitations & authorship: limitations.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - toc: { permalink: true }

plugins:
  - search
