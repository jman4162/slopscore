# AI-slop lexical markers, grouped by category. Each entry lists surface forms (matched as
# whole words, case-insensitively). `weight` scales a category's contribution; `profile_weights`
# overrides the multiplier per genre (1.0 = full weight, lower = more tolerated in that genre).
#
# Seeded from the spec's marker lists and excess-word studies (Kobak et al. 2024;
# "Why Does ChatGPT Delve So Much?" arXiv:2412.11385). Lexical markers are a population-level
# signal only: a single word is never proof. Scoring is frequency- and cluster-aware.

categories:
  overpolished_verbs:
    weight: 1.0
    severity: medium
    explanation: "Over-polished verb associated with LLM prose."
    profile_weights: { academic: 0.6, technical: 0.5, marketing: 0.7 }
    era: "gpt-4 (2023-mid2024)"
    source: "Juzek & Ward 2024 (arXiv:2412.11385); Kobak et al. 2025 (Science Advances)"
    terms:
      - delve
      - delves
      - delving
      - delved
      - underscore
      - underscores
      - underscoring
      - showcase
      - showcases
      - showcasing
      - leverage
      - leverages
      - leveraging
      - navigate
      - navigating
      - foster
      - fostering
      - elevate
      - elevates
      - elevating
      - illuminate
      - illuminating
      - garner
      - garners
      - garnering
      - bolster
      - bolstered
      - bolstering
      - harness
      - harnessing
      - streamline
      - streamlining

  generic_importance:
    weight: 0.8
    severity: low
    explanation: "Generic importance term used without concrete support."
    profile_weights: { academic: 0.4, technical: 0.3 }
    era: "persistent (all eras)"
    source: "Russell et al. 2025 (ACL); Kobak et al. 2025"
    terms:
      - crucial
      - vital
      - pivotal
      - robust
      - comprehensive
      - significant
      - essential
      - transformative
      - key
      - integral
      - paramount
      - notable
      - valuable

  synthetic_sophistication:
    weight: 1.0
    severity: medium
    explanation: "Inflated sophistication adjective common in generic LLM writing."
    profile_weights: { academic: 0.5, technical: 0.5 }
    era: "gpt-4 / gpt-4o"
    source: "Juzek & Ward 2024; Reinhart et al. 2025 (PNAS)"
    terms:
      - intricate
      - intricacies
      - nuanced
      - multifaceted
      - dynamic
      - seamless
      - holistic
      - tapestry
      - interplay
      - meticulous
      - meticulously
      - vibrant
      - enduring

  template_transitions:
    weight: 0.7
    severity: low
    explanation: "Template transition word that pads structure."
    profile_weights: { academic: 0.5, essay: 0.6 }
    era: "persistent; 'Additionally' especially gpt-4o+"
    source: "Geng et al. 2025; WP:AIVOCAB"
    terms:
      - moreover
      - furthermore
      - ultimately
      - importantly
      - notably
      - additionally

  abstract_nouns:
    weight: 0.8
    severity: low
    explanation: "Abstract LLM noun used in place of a concrete one."
    profile_weights: { academic: 0.6, technical: 0.6 }
    era: "persistent"
    source: "Russell et al. 2025; tropes.fyi"
    terms:
      - landscape
      - ecosystem
      - realm
      - paradigm
      - synergy
      - testament
      - cornerstone

  marketing_uplift:
    weight: 1.0
    severity: medium
    explanation: "Marketing-style uplift verb that inflates without evidence."
    profile_weights: { marketing: 0.4 }
    era: "persistent"
    source: "WP:AIPUFFERY; Walker Rettberg 2026"
    terms:
      - unlock
      - unlocks
      - unlocking
      - empower
      - empowers
      - empowering
      - unleash
      - unleashes
      - supercharge
      - revolutionize
      - revolutionizes
      - revolutionized
