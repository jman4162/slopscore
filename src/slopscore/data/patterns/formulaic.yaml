# Formulaic scaffolding patterns: templated phrases that read as machine-generated. Each rule
# is a case-insensitive regex (Python `regex` syntax) with a rule_id, severity, and explanation.
# Keep patterns specific enough to avoid false positives on ordinary prose.

rules:
  - rule_id: FORMULAIC_OPENING_FASTPACED
    severity: medium
    pattern: "in today's (?:fast[- ]paced|rapidly (?:evolving|changing)|digital) (?:world|landscape|era|age)"
    explanation: "Generic 'in today's fast-paced world' opening scaffold."

  - rule_id: FORMULAIC_WHETHER_BEGINNER
    severity: medium
    pattern: "whether you(?:'re| are) a (?:seasoned|complete )?\\w+ or (?:an? )?\\w+"
    explanation: "Templated 'whether you're a beginner or an expert' framing."

  - rule_id: FORMULAIC_MORE_THAN_JUST
    severity: medium
    pattern: "\\bis (?:much )?more than just\\b"
    explanation: "'X is more than just Y' inflation template."

  - rule_id: FORMULAIC_NOT_ONLY_BUT_ALSO
    severity: low
    pattern: "\\bnot only\\b[^.?!]{1,80}?\\bbut (?:it )?also\\b"
    explanation: "'Not only X, but also Y' paired-contrast scaffold."

  - rule_id: FORMULAIC_AT_ITS_CORE
    severity: low
    pattern: "\\bat its core\\b"
    explanation: "'At its core' generic framing."

  - rule_id: FORMULAIC_COMPREHENSIVE_GUIDE
    severity: medium
    pattern: "in this (?:comprehensive |ultimate |complete )?(?:guide|article|post|blog)"
    explanation: "Self-referential 'in this comprehensive guide' framing."

  - rule_id: FORMULAIC_LETS_DELVE
    severity: high
    pattern: "let(?:'s| us) (?:delve|dive|explore|take a (?:closer )?look) (?:into|in)\\b"
    explanation: "'Let's delve into' invitation scaffold."

  - rule_id: FORMULAIC_FROM_TO_OFFERS
    severity: low
    pattern: "\\bfrom \\w+ to \\w+,[^.?!]{1,60}?\\boffers\\b"
    explanation: "'From A to B, X offers...' enumeration template."

  - rule_id: FORMULAIC_WHEN_IT_COMES_TO
    severity: low
    pattern: "\\bwhen it comes to\\b"
    explanation: "'When it comes to' filler transition."

  - rule_id: FORMULAIC_IN_CONCLUSION
    severity: low
    pattern: "\\bin conclusion\\b"
    explanation: "'In conclusion' formulaic closer."

  - rule_id: FORMULAIC_GAME_CHANGER
    severity: medium
    pattern: "\\b(?:game[- ]changer|game[- ]changing)\\b"
    explanation: "'Game-changer' empty-uplift cliche."

  - rule_id: FORMULAIC_EVER_EVOLVING
    severity: low
    pattern: "\\bever[- ](?:evolving|changing|growing)\\b"
    explanation: "'Ever-evolving' filler modifier."

  # Rhetorical question-and-answer scaffolds: the writer poses a question then immediately answers
  # it. A distinctive AI/blog tell; rare in plain factual or non-native prose. (v0.6b)
  - rule_id: FORMULAIC_RHETORICAL_WHAT_MEAN
    severity: medium
    pattern: "\\b(?:so |but )?what does (?:this|that|it) mean\\?"
    explanation: "'What does this mean?' rhetorical question-and-answer scaffold."

  - rule_id: FORMULAIC_RHETORICAL_WHY_MATTER
    severity: medium
    pattern: "\\bwhy (?:does (?:this|that|it) matter|is (?:this|that|it) important)\\?"
    explanation: "'Why does this matter?' rhetorical question-and-answer scaffold."

  - rule_id: FORMULAIC_RHETORICAL_THE_ANSWER
    severity: low
    pattern: "\\bthe answer (?:is simple|is yes|is no|may surprise you)\\b"
    explanation: "'The answer is simple' rhetorical pay-off scaffold."

  - rule_id: FORMULAIC_RHETORICAL_HERES
    severity: low
    pattern: "\\bhere(?:'s| is) (?:the thing|why|what|how|the kicker)\\b[:,]"
    explanation: "'Here's the thing:' rhetorical set-up scaffold."

  - rule_id: FORMULAIC_RHETORICAL_SOUND_FAMILIAR
    severity: medium
    pattern: "\\bsound(?:s)? familiar\\?"
    explanation: "'Sound familiar?' rhetorical hook."

  - rule_id: FORMULAIC_RHETORICAL_WHAT_IF
    severity: low
    pattern: "\\bwhat if (?:I|we) told you\\b"
    explanation: "'What if I told you' rhetorical hook."
