name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    # Trusted publishing (OIDC) — no API tokens. Requires a PyPI trusted publisher configured for
    # this repo + workflow (Settings → Publishing on the PyPI project page).
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/slopscore-lint
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # PEP 740 attestations call Sigstore (rekor.sigstore.dev), which has transient outages
          # that block publishing. Provenance is optional, so it is disabled to keep releases
          # reliable; trusted publishing (OIDC) still authenticates the upload.
          attestations: false
